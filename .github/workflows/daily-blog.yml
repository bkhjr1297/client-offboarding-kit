name: Daily SEO Blog Post
on:
  schedule:
    - cron: '22 8 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  daily-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate next static blog post
        run: python scripts/generate_daily_blog.py
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog sitemap.xml
          git diff --cached --quiet || git commit -m "Add daily client offboarding SEO post"
          git push
